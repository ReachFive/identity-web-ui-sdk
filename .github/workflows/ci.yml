name: Continuous Integration

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run script unit tests
        run: npm run test:scripts

      - name: Install JUnit coverage reporter
        run: npm install --save-dev jest-junit

      - name: Run tests
        run: npm test -- --ci --reporters=default --reporters=jest-junit

      - name: Compute and set prerelease version
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.base.ref == 'master' &&
          contains(github.event.pull_request.labels.*.name, 'release')
        run: |
          BASE=$(node -p "require('./package.json').version")
          VERSIONS=$(npm view @reachfive/identity-ui versions --json 2>/dev/null || echo '')
          RC=$(printf '%s' "$VERSIONS" | node scripts/prerelease-version.mjs "$BASE")
          echo "Prerelease version: $RC"
          npm pkg set version="$RC"

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: jest-junit.xml
        env:
          JEST_JUNIT_OUTPUT_NAME: jest-junit.xml

      - name: Upload npm package artifact
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.base.ref == 'master' &&
          contains(github.event.pull_request.labels.*.name, 'release')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: npm-package
          retention-days: 1
          path: |
            package.json
            README.md
            LICENSE
            cjs
            es
            umd
            types
