name: Rollback latest tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version that 'latest' should point to (e.g. 2.0.0)"
        required: true

jobs:
  rollback:
    name: Rollback latest tag
    runs-on: ubuntu-latest
    # Anyone with write access to this repo can trigger this.
    # To add a second-pair-of-eyes approval gate, create a protected
    # Environment with required reviewers and uncomment the next line:
    # environment: npm-publish
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Show current dist-tags
        run: npm dist-tag ls @reachfive/identity-ui

      - name: Verify target version exists
        run: npm view "@reachfive/identity-ui@${{ inputs.version }}" version

      - name: Point latest at ${{ inputs.version }}
        run: npm dist-tag add "@reachfive/identity-ui@${{ inputs.version }}" latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Show dist-tags after rollback
        run: npm dist-tag ls @reachfive/identity-ui
